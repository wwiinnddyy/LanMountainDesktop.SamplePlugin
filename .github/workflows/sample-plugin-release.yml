name: Sample Plugin Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.2.3"
        required: true
        type: string
      target_ref:
        description: "Git ref to release from"
        required: false
        default: "main"
        type: string

env:
  DOTNET_VERSION: "10.0.x"
  MARKET_REPOSITORY: "wwiinnddyy/LanAirApp"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sample-plugin-release-${{ github.ref_name || github.event.inputs.version || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      release_tag: ${{ steps.metadata.outputs.release_tag }}
      asset_name: ${{ steps.metadata.outputs.asset_name }}
      target_commitish: ${{ steps.metadata.outputs.target_commitish }}

    steps:
      - name: Checkout sample plugin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: LanMountainDesktop.SamplePlugin
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_ref || github.ref }}

      - name: Checkout LanAirApp
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MARKET_REPOSITORY }}
          fetch-depth: 0
          path: LanAirApp

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve requested release version
        id: release_plan
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}".Trim()
            if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
              $version = $version.Substring(1)
            }
            $releaseTag = "v$version"
          }
          else {
            $releaseTag = "${{ github.ref_name }}"
            $version = $releaseTag.Substring(1)
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT

      - name: Apply release version
        shell: pwsh
        run: .\LanMountainDesktop.SamplePlugin\scripts\Set-PluginVersion.ps1 -Version "${{ steps.release_plan.outputs.version }}" -RepositoryRoot (Resolve-Path ".\LanMountainDesktop.SamplePlugin").Path

      - name: Validate plugin metadata
        shell: pwsh
        run: .\LanMountainDesktop.SamplePlugin\scripts\Test-PluginConsistency.ps1 -RepositoryRoot (Resolve-Path ".\LanMountainDesktop.SamplePlugin").Path

      - name: Prepare release source commit
        id: release_source
        shell: pwsh
        run: |
          $repoPath = (Resolve-Path ".\LanMountainDesktop.SamplePlugin").Path
          $releaseTag = "${{ steps.release_plan.outputs.release_tag }}"
          $eventName = "${{ github.event_name }}"
          $versionFiles = @(
            "LanMountainDesktop.SamplePlugin.csproj",
            "plugin.json",
            "README.md"
          )

          git -C $repoPath config user.name "github-actions[bot]"
          git -C $repoPath config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          $statusLines = git -C $repoPath status --porcelain -- $versionFiles
          $hasVersionFileChanges = $statusLines.Count -gt 0

          if ($eventName -eq "workflow_dispatch") {
            if ($hasVersionFileChanges) {
              $sourceBranch = "automation/release-source-$releaseTag"
              git -C $repoPath checkout -B $sourceBranch
              git -C $repoPath add -- $versionFiles
              git -C $repoPath commit -m "chore: prepare release $releaseTag"
              git -C $repoPath push origin HEAD:refs/heads/$sourceBranch --force
              $targetCommitish = (git -C $repoPath rev-parse HEAD).Trim()
              $temporaryBranch = $sourceBranch
            }
            else {
              $targetCommitish = (git -C $repoPath rev-parse HEAD).Trim()
              $temporaryBranch = ""
            }
          }
          else {
            if ($hasVersionFileChanges) {
              throw "Tag '$releaseTag' does not point to source files with matching plugin version metadata. Create the matching version commit first, or use workflow_dispatch to prepare the release version automatically."
            }

            $targetCommitish = (git -C $repoPath rev-parse HEAD).Trim()
            $temporaryBranch = ""
          }

          "target_commitish=$targetCommitish" >> $env:GITHUB_OUTPUT
          "temporary_branch=$temporaryBranch" >> $env:GITHUB_OUTPUT

      - name: Resolve build metadata
        id: metadata
        shell: pwsh
        run: |
          $manifest = Get-Content .\LanMountainDesktop.SamplePlugin\plugin.json -Raw | ConvertFrom-Json
          $version = $manifest.version.Trim()
          $assetName = "$($manifest.id).$version.laapp"
          "version=$version" >> $env:GITHUB_OUTPUT
          "release_tag=v$version" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT
          "target_commitish=${{ steps.release_source.outputs.target_commitish }}" >> $env:GITHUB_OUTPUT

      - name: Build plugin package
        shell: pwsh
        run: dotnet build .\LanMountainDesktop.SamplePlugin\LanMountainDesktop.SamplePlugin.csproj -c Release -v minimal

      - name: Validate built package
        shell: pwsh
        run: .\LanMountainDesktop.SamplePlugin\scripts\Test-PluginConsistency.ps1 -RepositoryRoot (Resolve-Path ".\LanMountainDesktop.SamplePlugin").Path -PackagePath ".\LanMountainDesktop.SamplePlugin\${{ steps.metadata.outputs.asset_name }}"

      - name: Generate release metadata
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\LanMountainDesktop.SamplePlugin\artifacts | Out-Null
          $packagePath = Resolve-Path ".\LanMountainDesktop.SamplePlugin\${{ steps.metadata.outputs.asset_name }}"
          $sha256 = (Get-FileHash -Path $packagePath -Algorithm SHA256).Hash.ToLowerInvariant()
          $md5 = (Get-FileHash -Path $packagePath -Algorithm MD5).Hash.ToLowerInvariant()
          Set-Content -Path .\LanMountainDesktop.SamplePlugin\artifacts\sha256.txt -Value $sha256 -Encoding utf8NoBOM
          Set-Content -Path .\LanMountainDesktop.SamplePlugin\artifacts\md5.txt -Value $md5 -Encoding utf8NoBOM
          .\LanMountainDesktop.SamplePlugin\scripts\New-ReleaseNotes.ps1 `
            -PackageName "${{ steps.metadata.outputs.asset_name }}" `
            -Version "${{ steps.metadata.outputs.version }}" `
            -ReleaseTag "${{ steps.metadata.outputs.release_tag }}" `
            -Md5 $md5 `
            -Sha256 $sha256 `
            -OutputPath .\LanMountainDesktop.SamplePlugin\artifacts\release-notes.md
          .\LanMountainDesktop.SamplePlugin\scripts\New-AirAppMarketSync.ps1 `
            -TemplatePath .\LanMountainDesktop.SamplePlugin\airappmarket-entry.template.json `
            -PackagePath $packagePath `
            -Version "${{ steps.metadata.outputs.version }}" `
            -OutputPath .\LanMountainDesktop.SamplePlugin\artifacts\airappmarket-sync.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sample-plugin-release
          path: |
            LanMountainDesktop.SamplePlugin/${{ steps.metadata.outputs.asset_name }}
            LanMountainDesktop.SamplePlugin/artifacts/sha256.txt
            LanMountainDesktop.SamplePlugin/artifacts/md5.txt
            LanMountainDesktop.SamplePlugin/artifacts/release-notes.md
            LanMountainDesktop.SamplePlugin/artifacts/airappmarket-sync.json
          if-no-files-found: error
          retention-days: 30

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.metadata.outputs.release_tag }}
          target_commitish: ${{ steps.metadata.outputs.target_commitish }}
          name: ${{ steps.metadata.outputs.release_tag }}
          body_path: LanMountainDesktop.SamplePlugin/artifacts/release-notes.md
          files: |
            LanMountainDesktop.SamplePlugin/${{ steps.metadata.outputs.asset_name }}
            LanMountainDesktop.SamplePlugin/artifacts/sha256.txt
            LanMountainDesktop.SamplePlugin/artifacts/md5.txt
            LanMountainDesktop.SamplePlugin/artifacts/airappmarket-sync.json
          fail_on_unmatched_files: true
          overwrite_files: true
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete temporary release source branch
        if: steps.release_source.outputs.temporary_branch != ''
        shell: pwsh
        run: git -C .\LanMountainDesktop.SamplePlugin push origin --delete "${{ steps.release_source.outputs.temporary_branch }}"

  sync-root-fallback-pr:
    needs: release
    runs-on: windows-latest

    steps:
      - name: Checkout sample plugin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: LanMountainDesktop.SamplePlugin
          ref: main

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: sample-plugin-release
          path: downloaded

      - name: Sync repository root fallback package
        shell: pwsh
        run: |
          .\LanMountainDesktop.SamplePlugin\scripts\Set-PluginVersion.ps1 -Version "${{ needs.release.outputs.version }}" -RepositoryRoot (Resolve-Path ".\LanMountainDesktop.SamplePlugin").Path
          Get-ChildItem .\LanMountainDesktop.SamplePlugin -Filter "*.laapp" -File | Remove-Item -Force
          $package = Get-ChildItem .\downloaded -Recurse -Filter "*.laapp" | Select-Object -First 1
          if (-not $package) {
            throw "Release package artifact not found."
          }
          Copy-Item $package.FullName (Join-Path (Resolve-Path ".\LanMountainDesktop.SamplePlugin").Path $package.Name) -Force

      - name: Create root fallback PR
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.SAMPLE_PLUGIN_PR_TOKEN != '' && secrets.SAMPLE_PLUGIN_PR_TOKEN || secrets.GITHUB_TOKEN }}
          path: LanMountainDesktop.SamplePlugin
          branch: automation/root-fallback-${{ needs.release.outputs.release_tag }}
          delete-branch: true
          commit-message: "chore: sync root fallback package ${{ needs.release.outputs.release_tag }}"
          title: "chore: sync root fallback package ${{ needs.release.outputs.release_tag }}"
          body: |
            Sync the repository-root fallback package and version files after releasing `${{ needs.release.outputs.release_tag }}`.
          add-paths: |
            *.laapp
            LanMountainDesktop.SamplePlugin.csproj
            plugin.json
            README.md

  sync-airappmarket-pr:
    needs: release
    runs-on: windows-latest
    env:
      LANAIRAPP_INDEX_TOKEN: ${{ secrets.LANAIRAPP_INDEX_TOKEN }}

    steps:
      - name: Check AirApp sync token
        id: airappmarket_token
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:LANAIRAPP_INDEX_TOKEN)) {
            "available=false" >> $env:GITHUB_OUTPUT
            Write-Host "LANAIRAPP_INDEX_TOKEN is not configured. Skipping AirApp Market sync."
          }
          else {
            "available=true" >> $env:GITHUB_OUTPUT
          }

      - name: Checkout sample plugin
        if: steps.airappmarket_token.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: LanMountainDesktop.SamplePlugin

      - name: Checkout LanAirApp
        if: steps.airappmarket_token.outputs.available == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MARKET_REPOSITORY }}
          fetch-depth: 0
          path: LanAirApp
          token: ${{ env.LANAIRAPP_INDEX_TOKEN }}
          ref: main

      - name: Download release artifacts
        if: steps.airappmarket_token.outputs.available == 'true'
        uses: actions/download-artifact@v4
        with:
          name: sample-plugin-release
          path: downloaded

      - name: Setup .NET
        if: steps.airappmarket_token.outputs.available == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Update AirApp Market index
        if: steps.airappmarket_token.outputs.available == 'true'
        shell: pwsh
        run: |
          $syncFile = Get-ChildItem .\downloaded -Recurse -Filter "airappmarket-sync.json" | Select-Object -First 1
          if (-not $syncFile) {
            throw "airappmarket-sync.json artifact not found."
          }
          .\LanMountainDesktop.SamplePlugin\scripts\Update-LanAirAppIndex.ps1 `
            -IndexPath .\LanAirApp\airappmarket\index.json `
            -SyncEntryPath $syncFile.FullName

      - name: Validate AirApp Market index
        if: steps.airappmarket_token.outputs.available == 'true'
        shell: pwsh
        run: dotnet run --project .\LanAirApp\airappmarket\tools\AirAppMarket.Validator -- .\LanAirApp\airappmarket\index.json .\LanAirApp\airappmarket\schema\airappmarket-index.schema.json

      - name: Create AirApp Market sync PR
        if: steps.airappmarket_token.outputs.available == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ env.LANAIRAPP_INDEX_TOKEN }}
          path: LanAirApp
          branch: automation/airappmarket-${{ needs.release.outputs.release_tag }}
          delete-branch: true
          commit-message: "chore: sync market entry ${{ needs.release.outputs.release_tag }}"
          title: "chore: sync market entry ${{ needs.release.outputs.release_tag }}"
          body: |
            Sync the official AirApp Market index for `${{ needs.release.outputs.release_tag }}`.
          add-paths: |
            airappmarket/index.json
