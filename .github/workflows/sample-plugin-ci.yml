name: Sample Plugin CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: "10.0.x"

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout sample plugin
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: LanMountainDesktop.SamplePlugin

      - name: Checkout LanMountainDesktop
        uses: actions/checkout@v4
        with:
          repository: wwiinnddyy/LanMountainDesktop
          fetch-depth: 0
          path: LanMountainDesktop

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize local package feed
        shell: pwsh
        run: |
          $feedPath = Join-Path (Resolve-Path ".\LanMountainDesktop.SamplePlugin").Path "packages"
          $sdkProject = Join-Path (Resolve-Path ".\LanMountainDesktop\LanMountainDesktop.PluginSdk").Path "LanMountainDesktop.PluginSdk.csproj"
          $contractsProject = Join-Path (Resolve-Path ".\LanMountainDesktop\LanMountainDesktop.Shared.Contracts").Path "LanMountainDesktop.Shared.Contracts.csproj"
          $pluginIsolationContractsProject = Join-Path (Resolve-Path ".\LanMountainDesktop\LanMountainDesktop.PluginIsolation.Contracts").Path "LanMountainDesktop.PluginIsolation.Contracts.csproj"
          $sharedIpcProject = Join-Path (Resolve-Path ".\LanMountainDesktop\LanMountainDesktop.Shared.IPC").Path "LanMountainDesktop.Shared.IPC.csproj"
          .\LanMountainDesktop.SamplePlugin\scripts\Initialize-LocalPackageFeed.ps1 `
            -FeedPath $feedPath `
            -PluginSdkProjectPath $sdkProject `
            -CoreContractsProjectPath $contractsProject `
            -PluginIsolationContractsProjectPath $pluginIsolationContractsProject `
            -SharedIpcProjectPath $sharedIpcProject

      - name: Validate plugin metadata
        shell: pwsh
        run: .\LanMountainDesktop.SamplePlugin\scripts\Test-PluginConsistency.ps1 -RepositoryRoot (Resolve-Path ".\LanMountainDesktop.SamplePlugin").Path

      - name: Resolve build metadata
        id: metadata
        shell: pwsh
        run: |
          $manifest = Get-Content .\LanMountainDesktop.SamplePlugin\plugin.json -Raw | ConvertFrom-Json
          $version = $manifest.version.Trim()
          $assetName = "$($manifest.id).$version.laapp"
          "version=$version" >> $env:GITHUB_OUTPUT
          "asset_name=$assetName" >> $env:GITHUB_OUTPUT

      - name: Build plugin package
        shell: pwsh
        run: dotnet build .\LanMountainDesktop.SamplePlugin\LanMountainDesktop.SamplePlugin.csproj -c Release -v minimal

      - name: Validate built package
        shell: pwsh
        run: .\LanMountainDesktop.SamplePlugin\scripts\Test-PluginConsistency.ps1 -RepositoryRoot (Resolve-Path ".\LanMountainDesktop.SamplePlugin").Path -PackagePath ".\LanMountainDesktop.SamplePlugin\${{ steps.metadata.outputs.asset_name }}"

      - name: Generate market metadata artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .\LanMountainDesktop.SamplePlugin\artifacts | Out-Null
          $packagePath = Resolve-Path ".\LanMountainDesktop.SamplePlugin\${{ steps.metadata.outputs.asset_name }}"
          .\LanMountainDesktop.SamplePlugin\scripts\New-MarketManifest.ps1 `
            -TemplatePath .\LanMountainDesktop.SamplePlugin\airappmarket-entry.template.json `
            -PackagePath $packagePath `
            -Version "${{ steps.metadata.outputs.version }}" `
            -ReleaseTag "v${{ steps.metadata.outputs.version }}" `
            -OutputPath .\LanMountainDesktop.SamplePlugin\artifacts\market-manifest.json

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sample-plugin-ci
          path: |
            LanMountainDesktop.SamplePlugin/${{ steps.metadata.outputs.asset_name }}
            LanMountainDesktop.SamplePlugin/artifacts/market-manifest.json
          if-no-files-found: error
          retention-days: 14
